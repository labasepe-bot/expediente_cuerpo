<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expedientes del Cuerpo - Programa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=League+Gothic&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400&display=swap" rel="stylesheet">

  <style>
    :root{
  --bg: #858b98;
  --bg-deep: #757d8d;
  --green: #7f992b;
  --green-deep: #728a25;
  --panel: #6e7590;
  --text: #08111f;
  --navy: #041b36;
  --line: rgba(4,27,54,.18);
  --white-soft: rgba(255,255,255,.96);
  --white-mid: rgba(255,255,255,.82);
  --white-low: rgba(255,255,255,.68);
  --accent: #e1b14f;
  --accent-soft: rgba(225,177,79,.18);
  --shadow: 0 20px 44px rgba(16,24,40,.12);
  --shadow-hover: 0 28px 60px rgba(16,24,40,.18);
  --radius: 32px;
  --radius-sm: 22px;
  --danger: #ffb5b5;
  --whatsapp: #25D366;
  --soft-card: rgba(255,255,255,.08);
  --soft-border: rgba(255,255,255,.12);
  --ok-bg: rgba(143,207,111,.13);
  --ok-border: rgba(143,207,111,.45);
  --warn-bg: rgba(225,177,79,.11);
  --warn-border: rgba(225,177,79,.42);
}

    * { box-sizing: border-box; }
    html, body { width:100%; overflow-x:hidden; }

   body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  background:
    radial-gradient(circle at top, rgba(255,255,255,.14), transparent 32%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
  padding: 28px;
  font-family: Arial, sans-serif;
}

.stack{
  width:min(1480px, 100%);
}

.page-header{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  color:var(--navy);
  padding: 22px 0 58px;
}

    .ornament{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      width:100%;
      margin: 0 auto 26px;
    }

    .ornament-line{
      width: clamp(76px, 14vw, 146px);
      height: 3px;
      background: var(--accent);
      border-radius: 999px;
      opacity: .95;
    }

    .ornament-diamond{
      width: 20px;
      height: 20px;
      background: var(--accent);
      transform: rotate(45deg);
      border-radius: 1px;
      flex: 0 0 auto;
    }
.festival-title{
  margin: 0;
  text-transform: uppercase;
  color: var(--navy);
  line-height: .82;
  text-wrap: balance;
}

.festival-title-top{
  display:block;
  font-family: "League Gothic", sans-serif;
  font-size: clamp(72px, 10vw, 168px);
  letter-spacing: .028em;
  font-weight: 400;
}

.festival-title-bottom{
  display:block;
  font-family: "League Gothic", sans-serif;
  font-size: clamp(175px, 24vw, 418px);
  letter-spacing: .02em;
  font-weight: 400;
  margin-top: 0;
}

    .festival-divider{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      width:100%;
      margin: 18px 0 18px;
    }

    .festival-divider .ornament-line{
      width: min(100%, 740px);
      height: 3px;
    }

    .festival-divider .ornament-diamond{
      width: 20px;
      height: 20px;
    }

    .festival-subtitle{
      margin: 0;
      font-family: "Barlow Condensed", sans-serif;
      color: var(--navy);
      font-size: clamp(28px, 3vw, 54px);
      letter-spacing: .03em;
      line-height: 1.05;
      font-weight: 500;
    }

    .festival-short-line{
      width: clamp(84px, 9vw, 130px);
      height: 4px;
      background: var(--accent);
      border-radius: 999px;
      margin: 26px 0 28px;
    }

    .festival-date{
      margin: 0 0 6px;
      font-family: "Barlow Condensed", sans-serif;
      text-transform: uppercase;
      color: var(--navy);
      font-size: clamp(54px, 6vw, 110px);
      letter-spacing: .035em;
      line-height: .95;
      font-weight: 700;
    }

    .festival-venue{
      margin: 0 0 34px;
      font-family: "Barlow Condensed", sans-serif;
      color: var(--navy);
      font-size: clamp(36px, 4vw, 76px);
      line-height: 1;
      font-weight: 600;
      letter-spacing: .02em;
    }

    .program-heading{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:22px;
      width:100%;
      margin-top: 6px;
    }

    .program-heading-line{
      width: clamp(90px, 11vw, 156px);
      height: 3px;
      background: var(--accent);
      border-radius: 999px;
    }

    .program-heading-text{
      font-family: "Barlow Condensed", sans-serif;
      text-transform: uppercase;
      color: var(--navy);
      font-size: clamp(32px, 3.1vw, 60px);
      letter-spacing: .28em;
      line-height: 1;
      font-weight: 600;
      padding-left: .28em;
    }

    .days-list{
      display:grid;
      gap: 30px;
    }

    .accordion{
      width:100%;
    }

    .event-button{
      width:100%;
      border:none;
      padding:0;
      background:transparent;
      cursor:pointer;
      display:block;
    }

  .event-button-inner{
  display:grid;
  grid-template-columns: 18% 1fr;
  width:100%;
  min-height: 360px;
  border-radius: var(--radius);
  overflow:hidden;
  box-shadow: var(--shadow);
  transition: transform .24s ease, box-shadow .24s ease, filter .24s ease;
  position:relative;
  border: 1px solid rgba(255,255,255,.12);
}

.event-button-inner::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.14);
}

.event-button:hover .event-button-inner{
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  filter: saturate(1.04);
}

.event-button:active .event-button-inner{
  transform: translateY(-1px);
}

   .media-panel{
  position: relative;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.04)),
    url("la-base-vertical.png") center center / cover no-repeat;
  min-width: 0;
  filter: saturate(1.03) contrast(1.03);
}

.content-panel{
  position:relative;
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.03)),
    linear-gradient(135deg, var(--green) 0%, var(--green-deep) 100%);
  display:grid;
  grid-template-columns: 58% 42%;
  min-width:0;
}

.left-content{
  padding: 34px 28px 32px 34px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:flex-start;
  color:var(--text);
  min-width:0;
}

.tagline{
  font-family: "Barlow Condensed", sans-serif;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.025em;
  font-size: clamp(18px, 1.55vw, 30px);
  line-height:1;
  margin:0 0 14px 0;
  opacity:.96;
}

.type{
  font-family: "Barlow Condensed", sans-serif;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.01em;
  font-size: clamp(28px, 2.5vw, 52px);
  line-height:.94;
  margin:0 0 14px 0;
}

.title{
  font-family: "League Gothic", sans-serif;
  font-weight:400;
  color:var(--text);
  font-size: clamp(88px, 8.7vw, 190px);
  line-height:.84;
  letter-spacing: .01em;
  margin:0;
  text-transform:uppercase;
  text-align:left;
  max-width: 100%;
  word-break: break-word;
}

    .title .quotes{
      font-family: "Barlow Condensed", sans-serif;
      font-weight:700;
      font-size: .62em;
      vertical-align: top;
      margin-right: .02em;
    }

   .right-content{
  position:relative;
  padding: 34px 30px 34px 30px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:var(--text);
  min-width:0;
}

.right-content::before{
  content:"";
  position:absolute;
  left:0;
  top:14%;
  bottom:14%;
  width:2px;
  background: rgba(4,27,54,.2);
}

.date{
  font-family: "League Gothic", sans-serif;
  font-weight:400;
  font-size: clamp(78px, 7vw, 148px);
  line-height:.84;
  letter-spacing:.02em;
  margin:0 0 18px 0;
  text-transform:uppercase;
}

.date-line{
  width: 82%;
  height: 2px;
  background: rgba(4,27,54,.2);
  margin-bottom: 18px;
}

.city{
  font-family: "Barlow Condensed", sans-serif;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing: .08em;
  font-size: clamp(24px, 2.1vw, 42px);
  line-height:1;
  margin:0 0 10px 0;
}

.venue{
  font-family: "Barlow Condensed", sans-serif;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing: .12em;
  font-size: clamp(11px, .95vw, 18px);
  line-height:1.15;
  color: var(--white-soft);
  margin:0;
  text-align:center;
  white-space:normal;
}

    .chevron{
      position:absolute;
      right: 24px;
      bottom: 22px;
      width: 18px;
      height: 18px;
      border-right: 3px solid rgba(0,0,0,.58);
      border-bottom: 3px solid rgba(0,0,0,.58);
      transform: rotate(45deg);
      transition: transform .55s ease, opacity .42s ease;
      opacity: .82;
      pointer-events:none;
    }

    .accordion.open .chevron{
      transform: rotate(-135deg) translate(-2px, -2px);
    }

    .dropdown{
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-8px);
      transition:
        max-height 1.15s cubic-bezier(.23,.79,.24,1),
        opacity .65s ease,
        transform .65s ease;
    }

    .accordion.open .dropdown{
      max-height: 9000px;
      opacity: 1;
      transform: translateY(0);
    }

.dropdown-inner{
  background:
    linear-gradient(rgba(110,118,142,.96), rgba(104,112,136,.96)),
    radial-gradient(circle at 18% 68%, rgba(255,255,255,.08) 0 16%, transparent 17%),
    radial-gradient(circle at 72% 22%, rgba(255,255,255,.05) 0 10%, transparent 11%),
    linear-gradient(135deg, rgba(255,255,255,.04), rgba(255,255,255,0));
  border-radius: 0 0 34px 34px;
  box-shadow: var(--shadow);
  padding: 0;
  color: white;
  overflow: hidden;
}

.program-row{
  display:grid;
  grid-template-columns: 150px 1fr 240px;
  gap: 22px;
  padding: 26px 30px;
  align-items:center;
  position:relative;
  background: transparent;
  border-bottom: 1px solid rgba(255,255,255,.08);
  width: 100%;
  text-align: left;
  color: inherit;
  cursor: pointer;
  transition: background-color .25s ease, box-shadow .2s ease, transform .18s ease;
}

.program-row:hover{
  background: rgba(255,255,255,.045);
}

.program-row.selected{
  background: rgba(225,177,79,.13);
  box-shadow: inset 0 0 0 1px rgba(225,177,79,.38);
}
.time-col{
  color: var(--accent);
  font-family: "League Gothic", sans-serif;
  font-size: clamp(42px, 3vw, 68px);
  line-height:.92;
  letter-spacing:.02em;
  text-transform:uppercase;
  white-space:nowrap;
  text-shadow: 0 2px 4px rgba(0,0,0,.12);
}

.label{
  font-family: "Barlow Condensed", sans-serif;
  font-weight:700;
  text-transform:uppercase;
  font-size: clamp(18px, 1.15vw, 24px);
  line-height:1;
  letter-spacing:.05em;
  color: rgba(255,255,255,.95);
  margin-bottom: 8px;
}

.activity{
  font-family: "Barlow Condensed", sans-serif;
  font-weight:700;
  color: white;
  font-size: clamp(28px, 2vw, 46px);
  line-height:1.02;
  margin:0 0 8px 0;
  text-shadow: 0 2px 4px rgba(0,0,0,.12);
}
.activity.feature{

  color: var(--accent);

}
.credit{
  font-family: Arial, sans-serif;
  font-style: italic;
  color: var(--white-mid);
  font-size: clamp(15px, .95vw, 20px);
  line-height:1.35;
}

.place-col{
  border-left: 2px solid rgba(225,177,79,.42);
  padding-left: 22px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-height: 100%;
  color: rgba(255,255,255,.96);
  font-family: "Barlow Condensed", sans-serif;
  font-size: clamp(20px, 1.35vw, 30px);
  line-height:1.08;
  text-align:left;
  position:relative;
}

 .click-hint{
  margin-top: 14px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 9px 13px;
  border-radius: 999px;
  background: rgba(225,177,79,.13);
  border: 1px solid rgba(225,177,79,.26);
  color: #fff8e8;
  font-family: "Barlow Condensed", sans-serif;
  font-size: 14px;
  line-height: 1;
  letter-spacing: .06em;
  text-transform: uppercase;
  flex-wrap: wrap;
}

    .click-hint .dot{
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(225,177,79,.14);
      flex: 0 0 auto;
    }

.registration-zone{
  padding: 34px 30px 38px;
  border-top: 1px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.03);
}

.selection-status{
  border-radius: 18px;
  padding: 16px 18px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  color: #edf3ff;
  line-height: 1.5;
  margin-bottom: 20px;
  font-size: 15px;
}

.selection-status.warn{
  background: var(--warn-bg);
  border-color: var(--warn-border);
  color: #fff6de;
}

.selection-title{
  margin: 0 0 12px;
  font-family: "Barlow Condensed", sans-serif;
  font-size: clamp(24px, 1.8vw, 40px);
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--accent);
}

.selection-item{
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 16px;
  padding: 13px 15px;
}

    .selection-item-top{
      display:flex;
      flex-wrap:wrap;
      gap:10px 14px;
      align-items:center;
      margin-bottom: 5px;
    }

    .selection-time{
      font-family: "League Gothic", sans-serif;
      color: var(--accent);
      font-size: 28px;
      line-height: .9;
      letter-spacing: .01em;
    }

    .selection-kind{
      font-family: "Barlow Condensed", sans-serif;
      text-transform: uppercase;
      letter-spacing: .05em;
      font-size: 15px;
      color: rgba(255,255,255,.76);
    }

    .selection-name{
      font-family: "Barlow Condensed", sans-serif;
      font-size: 26px;
      line-height: 1.03;
      color: #fff;
      text-transform: uppercase;
    }

    .selection-place{
      font-size: 14px;
      color: rgba(255,255,255,.75);
      margin-top: 6px;
    }

    .row-panel-note{
      color: var(--white-mid);
      font-size: 15px;
      line-height: 1.45;
      margin: 10px 0 22px;
    }

    .info-cards{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 0 0 18px;
    }

    .info-card{
      background: var(--soft-card);
      border: 1px solid var(--soft-border);
      border-radius: 18px;
      padding: 16px 16px 15px;
    }

    .info-card-label{
      font-family: "Barlow Condensed", sans-serif;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-size: 16px;
      color: rgba(255,255,255,.75);
      margin-bottom: 8px;
    }

    .info-card-value{
      font-family: "Poppins", sans-serif;
      font-weight: 700;
      font-size: 18px;
      line-height: 1.25;
      color: #fff;
    }

    .price-options{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    .price-option{
      position:relative;
    }

    .price-option input{
      position:absolute;
      opacity:0;
      pointer-events:none;
    }

    .price-option label{
      display:block;
      width:100%;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(15,23,42,.26);
      color:#fff;
      border-radius: 18px;
      padding: 16px 16px 15px;
      cursor:pointer;
      transition: border-color .2s ease, background-color .2s ease, transform .15s ease, box-shadow .2s ease;
    }

    .price-option label:hover{
      transform: translateY(-1px);
      border-color: rgba(225,177,79,.45);
    }

    .price-option input:checked + label{
      border-color: rgba(225,177,79,.8);
      background: rgba(225,177,79,.14);
      box-shadow: 0 0 0 3px rgba(225,177,79,.12);
    }

    .price-option-title{
      font-family:"Barlow Condensed", sans-serif;
      text-transform:uppercase;
      letter-spacing:.04em;
      font-size:20px;
      color:#fff;
      margin-bottom:8px;
    }

    .price-option-price{
      font-family:"Poppins", sans-serif;
      font-weight:800;
      font-size:28px;
      color: #f9df9a;
      line-height:1;
      margin-bottom:6px;
    }

    .price-option-note{
      font-size:13px;
      color: rgba(255,255,255,.72);
      line-height:1.35;
    }

    .form-grid{
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
.form-actions{
  margin-top: 24px;
}

    .field{
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field.full{
      grid-column: 1 / -1;
    }

    .field label{
      font-family: "Barlow Condensed", sans-serif;
      text-transform: uppercase;
      letter-spacing: .04em;
      font-size: 18px;
      color: rgba(255,255,255,.96);
    }

    .field .req{
      color: var(--accent);
    }
.field input{
  width: 100%;
  border: 1px solid rgba(255,255,255,.16);
  background: rgba(15,23,42,.36);
  color: #fff;
  border-radius: 16px;
  padding: 16px 17px;
  font-size: 16px;
  outline: none;
  transition: border-color .2s ease, box-shadow .2s ease, background-color .2s ease, transform .18s ease;
}

.btn-primary,
.btn-secondary,
.btn-whatsapp{
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  border: 0;
  border-radius: 18px;
  padding: 17px 22px;
  text-decoration: none;
  cursor: pointer;
  transition: transform .15s ease, filter .15s ease, box-shadow .15s ease;
  font-family: "Barlow Condensed", sans-serif;
  text-transform: uppercase;
  letter-spacing: .05em;
  font-size: 21px;
  width: 100%;
}

    .btn-primary{
      background: var(--accent);
      color: #111;
      box-shadow: 0 8px 22px rgba(0,0,0,.14);
    }

    .btn-secondary{
      background: rgba(255,255,255,.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 8px 22px rgba(0,0,0,.08);
    }

    .btn-whatsapp{
      background: var(--whatsapp);
      color: #0d2316;
      box-shadow: 0 8px 22px rgba(0,0,0,.14);
    }

    .btn-primary:hover,
    .btn-secondary:hover,
    .btn-whatsapp:hover{
      transform: translateY(-1px);
      filter: saturate(1.04);
    }

    .btn-whatsapp svg{
      width: 22px;
      height: 22px;
      fill: currentColor;
      flex: 0 0 auto;
    }
.event-button:focus-visible,

.program-row:focus-visible,

.btn-primary:focus-visible,

.btn-secondary:focus-visible,

.btn-whatsapp:focus-visible,

.field input:focus-visible{

  outline: 3px solid rgba(225,177,79,.7);

  outline-offset: 3px;

}
    .result-box{
      display:none;
      margin-top: 16px;
      border-radius: 14px;
      padding: 14px 16px;
      line-height: 1.45;
      font-size: 15px;
    }

    .result-box.show{
      display:block;
    }

    .result-box.ok{
      background: var(--ok-bg);
      border: 1px solid var(--ok-border);
      color: #eaf8df;
    }

    .result-box.error{
      background: rgba(255,181,181,.09);
      border: 1px solid rgba(255,181,181,.3);
      color: #ffe6e6;
    }

    .registration-code{
      display:inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(225,177,79,.14);
      border: 1px solid rgba(225,177,79,.34);
      color: #fff7e2;
      font-family: "Barlow Condensed", sans-serif;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-size: 18px;
    }

    .ticket-preview-wrap{
      margin-top: 18px;
      display:none;
      gap:16px;
      align-items:flex-start;
      flex-direction:column;
    }

    .ticket-preview-wrap.show{
      display:flex;
    }

    .ticket-preview-card{
      width:min(100%, 620px);
      background: linear-gradient(180deg, #0f1524 0%, #121d32 100%);
      border: 1px solid rgba(225,177,79,.28);

    function slugify(text) {
      return text
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9-]/g, '');
    }

    function buildRandomCode(prefix) {
      const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let randomPart = '';
      for (let i = 0; i < 6; i++) {
        randomPart += alphabet.charAt(Math.floor(Math.random() * alphabet.length));
      }
      return `${prefix}-${randomPart}`;
    }

    function validEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

        method: 'POST',

      const text = await response.text();

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`No se pudo cargar la imagen: ${src}`));
    img.src = src;
  });
}

function wrapCanvasText(ctx, text, maxWidth) {
  const cleanText = String(text || '').trim();
  if (!cleanText) return [];

  const words = cleanText.split(/\s+/);
  const lines = [];
  let current = '';

  for (let word of words) {
    let test = current ? `${current} ${word}` : word;

    if (ctx.measureText(test).width <= maxWidth) {
      current = test;
      continue;
    }

    if (current) {
      lines.push(current);
      current = '';
    }

    if (ctx.measureText(word).width <= maxWidth) {
      current = word;
      continue;
    }

    let partial = '';
    for (const char of word) {
      const next = partial + char;
      if (ctx.measureText(next).width <= maxWidth) {
        partial = next;
      } else {
        if (partial) lines.push(partial);
        partial = char;
      }
    }
    current = partial;
  }

  if (current) lines.push(current);

  return lines;
}

function drawTicketField(ctx, fieldConfig, value) {
  ctx.save();
  ctx.font = `${fieldConfig.fontSize}px "Oswald", sans-serif`;
  ctx.fillStyle = fieldConfig.color;
  ctx.textBaseline = 'top';
  ctx.textAlign = fieldConfig.align;

  const lines = wrapCanvasText(ctx, value || '', fieldConfig.maxWidth).slice(0, fieldConfig.maxLines);

  let drawX = fieldConfig.x;

  lines.forEach((line, i) => {
    ctx.fillText(line, drawX, fieldConfig.y + i * fieldConfig.lineHeight);
  });

  ctx.restore();
}

async function generateTicketCanvas(ticketData) {
  const canvas = document.createElement('canvas');
  canvas.width = 1080;
  canvas.height = 1920;

  const ctx = canvas.getContext('2d');

  await document.fonts.ready;
  const template = await loadImage(TICKET_TEMPLATE_SRC);

  ctx.drawImage(template, 0, 0, 1080, 1920);

  Object.values(TICKET_FIELDS).forEach((field) => {
    const value = ticketData[field.valueKey] || '';
    drawTicketField(ctx, field, value);
  });

  return canvas;
}

async function downloadGeneratedTicket(ticketData, fileName) {
  const canvas = await generateTicketCanvas(ticketData);
  const link = document.createElement('a');
  link.download = fileName;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

        return;
      }

      if (mode === 'mixed') {
        registrationZone.innerHTML = `
          <div class="selection-status warn">
            No es posible combinar eventos gratuitos con eventos pagos en una misma inscripción. Deselecciona uno de los dos tipos para continuar.
          </div>

        return;
      }

      if (mode === 'free') {
        registrationZone.innerHTML = renderFreeForm(accordionEl.id, day, selectedEvents);
        attachFreeFormHandler(day, accordionEl, selectedEvents);
        return;
      }

      registrationZone.innerHTML = renderPaidForm(accordionEl.id, day, selectedEvents[0]);
      attachPaidFormHandler(day, accordionEl, selectedEvents[0]);
    }

          if (clickedMode === 'paid') {
            if (clickedIsSelected) {
